artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "The task requires correctly parsing Apache-style access logs and producing a structured JSON report with deterministic summary statistics."
solution_explanation = "Parse each log entry, count total requests, determine the number of unique client IPs, compute request frequencies per path, and emit the most frequently requested path."
verification_explanation = "The verifier checks that the JSON report exists, has the required schema, and that every reported value matches the expected statistics computed from the supplied access log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []